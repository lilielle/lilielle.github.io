<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lilielle — Softness on Skin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Elegant fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#f7e8ea;
      color:#7c4d5c;
      font-family:'Montserrat', sans-serif;
      overflow-x:hidden;
    }

    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:40px 20px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent 40%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.4), transparent 35%),
        #f7e8ea;
    }

    .logo{
      width:520px;
      max-width:90%;
      margin-bottom:30px;
      filter: drop-shadow(0 10px 20px rgba(124,77,92,0.08));
    }

    h1{
      font-family:'Cormorant Garamond', serif;
      font-size:72px;
      font-weight:300;
      letter-spacing:2px;
      margin-bottom:10px;
    }

    .tagline{
      letter-spacing:6px;
      font-size:13px;
      text-transform:uppercase;
      color:#a06d7d;
      margin-bottom:40px;
    }

    .description{
      max-width:680px;
      line-height:1.9;
      font-size:15px;
      color:#8b6571;
      margin-bottom:40px;
    }

    .button{
      display:inline-block;
      padding:14px 34px;
      border-radius:999px;
      text-decoration:none;
      background:#c98ea1;
      color:white;
      transition:0.3s ease;
      letter-spacing:1px;
      font-size:13px;
    }

    .button:hover{
      background:#b97c90;
      transform:translateY(-2px);
    }

    .footer{
      padding:30px;
      text-align:center;
      font-size:12px;
      color:#b58b97;
    }

    @media(max-width:768px){

      h1{
        font-size:48px;
      }

      .tagline{
        letter-spacing:4px;
        font-size:11px;
      }

      .description{
        font-size:14px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <!-- Replace with your logo -->
    <img src="assets/logo.png" alt="Lilielle Logo" class="logo">

    <h1>Lilielle</h1>

    <div class="tagline">
      SOFTNESS ON SKIN
    </div>

    <p class="description">
      A soft lingerie aesthetic inspired by Korean and Japanese femininity —
      delicate lace, pastel moods, gentle silhouettes, and dreamy elegance
      designed to feel lovely on every skin.
    </p>

    <a href="#" class="button">
      Coming Soon
    </a>

  </section>

  <div class="footer">
    © 2026 Lilielle.com — All Rights Reserved
  </div>

</body>
</html>
